name: ci-live-nim

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  nim-deep-test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm]"
      - name: Run deep NIM integration test
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL }}
          NVIDIA_NIM_API_BASE: ${{ vars.NVIDIA_NIM_API_BASE }}
          CONTEXT_MANAGER_TIMEOUT: "300"
        run: |
          python scripts/nim_deep_test.py
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nim-deep-test-logs
          path: |
            .pytest_cache

