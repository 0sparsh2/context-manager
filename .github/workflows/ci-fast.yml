name: ci-fast

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run fixture evals
        run: context-manager eval-all fixtures
      - name: Benchmark budget gates
        run: |
          python scripts/benchmark_ci_gate.py \
            --fixtures fixtures \
            --dynamic-budgets \
            --json-out benchmark-report.json
      - name: Memory backend smoke
        run: python scripts/memory_smoke_test.py
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.json

